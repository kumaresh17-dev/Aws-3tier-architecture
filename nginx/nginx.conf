# Nginx Setup (Web Server - Reverse Proxy)

---

## 📌 Overview

In this project, Nginx is used as a web server and reverse proxy.

- Runs in Web Server (Public Subnet)
- Forwards requests to Application Server (Private Subnet)

---

## 🏗️ Architecture Role

User → CloudFront → ALB → Nginx (Web Server) → App Server

---

## 🧱 Step 1: Connect to Web Server

From local machine:

ssh -i your-key.pem ec2-user@<web-server-public-ip>

---

## ⚙️ Step 2: Install Nginx

Run:

sudo yum update -y  
sudo yum install nginx -y  

---

## ▶️ Step 3: Start and Enable Nginx

sudo systemctl start nginx  
sudo systemctl enable nginx  

---

## 🧪 Step 4: Test Nginx

- Open browser  
- Enter Web Server Public IP  

👉 Default Nginx page should load  

---

## 🛠️ Step 5: Configure Reverse Proxy

Edit config file:

sudo nano /etc/nginx/nginx.conf

---

### 🔹 Replace server block with:

server {
    listen 80;

    location / {
        proxy_pass http://<APP_SERVER_PRIVATE_IP>:5000;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

---

## 🔁 Step 6: Restart Nginx

sudo systemctl restart nginx

---

## 🔄 Step 7: Verify End-to-End Flow

- Access ALB DNS / CloudFront  
- Request → Nginx → App Server  
- Response should be displayed  

---

## 🔐 Security Considerations

- Nginx only receives traffic from ALB  
- App Server is not publicly accessible  
- Communication happens via private IP  

---

## 🎯 Final Result

✔ Nginx installed and running  
✔ Reverse proxy configured  
✔ Requests forwarded to App Server  
✔ Backend protected  

---

## ⚡ Common Mistakes

❌ Wrong App Server IP  
❌ Port 5000 not open  
❌ Nginx not restarted  
❌ Security group blocking traffic  

✔ Always verify connectivity  

---

## 💡 Pro Tips

- Use upstream block for multiple app servers  
- Enable logging  
- Configure HTTPS (future)  
